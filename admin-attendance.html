<html lang="en">


<head>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/admin-attendance.css">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Modern Teams - Attendance
</title>


</head>



<body>



<div class="app-layout">





<!-- ======================
     SIDEBAR
====================== -->

<button id="menuToggle" class="menu-toggle">

☰

</button>

<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside class="sidebar">



<div class="logo">

<img src="assets/logo/mt-logo.jpeg" alt="Logo">


<h2>
Modern Teams
</h2>


</div>




<nav class="menu">


<a href="admin.html">
🏠 Dashboard
</a>



<a href="admin-employees.html">
👥 Employees
</a>




<a class="active" href="admin-attendance.html">
🕒 Attendance
</a>




<a href="admin-leaves.html">

<a href="admin-announcements.html">
📢 Announcements
</a>




<a href="admin-profile.html">
⚙ Profile
</a>




<a href="login.html" onclick="logout()">
🚪 Logout
</a>



</nav>


</aside>









<!-- ======================
     MAIN CONTENT
====================== -->


<main class="main-content">





<header class="topbar">


<div>


<h1>
Attendance
</h1>


<p>
Track employee attendance
</p>


</div>




<div class="admin-info">

<div class="notification" onclick="openNotifications()">

    🔔

    <span id="notificationCount" class="notification-badge">
        0
    </span>

</div>

</div>

<div class="avatar">
MT
</div>



</div>



</header>










<section class="content attendance-section">







<!-- FILTER AREA -->


<div class="card filter-card">



<h2>
Attendance Filter
</h2>




<div class="filter-grid">



<div>


<label>
Select Date
</label>


<input 
type="date"
id="attendanceDate">


</div>






<div>


<label>
Search Employee
</label>


<input 
type="text"
id="attendanceSearch"
placeholder="Search employee">


</div>






<div>


<label>
Department
</label>



<select id="attendanceDepartment">


<option>
All Departments
</option>


<option>
IT
</option>


<option>
HR
</option>


<option>
Marketing
</option>


<option>
Sales
</option>



</select>


</div>




</div>





</div>












<!-- ATTENDANCE TABLE -->



<div class="table-card table-section">



<h2>
Employee Attendance
</h2>





<table>


<thead>


<tr>



<th>
Employee
</th>



<th>
Date
</th>



<th>
Check In
</th>



<th>
Check Out
</th>



<th>
Working Hours
</th>



<th>
Status
</th>




</tr>



</thead>






<tbody id="attendanceTableBody">



<tr>


<td colspan="6">

No Attendance Found

</td>


</tr>


</tbody>





</table>






</div>








</section>








</main>




</div>









<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/admin-attendance.js"></script>

<script src="js/sidebar.js"></script>

<script src="js/notification.js"></script>

</body>


</html>
