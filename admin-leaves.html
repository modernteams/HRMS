<!-- ======================
     MAIN CONTENT
====================== -->


<main class="main-content">





<header class="topbar">


<div>


<h1>
Leave Management
</h1>


<p>
Manage employee leave requests
</p>


</div>





<div class="admin-info">


<div class="notification">
🔔
</div>


<div class="avatar">
MT
</div>


</div>



</header>









<section class="content page-section leave-section">








<!-- FILTER -->


<div class="card filter-card">



<h2>
Leave Filters
</h2>




<div class="filter-grid">



<div>


<label>
Search Employee
</label>


<input
type="text"
id="leaveSearch"
placeholder="Search employee">


</div>







<div>


<label>
Status
</label>


<select id="leaveStatusFilter">


<option>
All
</option>


<option>
Pending
</option>


<option>
Approved
</option>


<option>
Rejected
</option>



</select>



</div>






<div>


<label>
Leave Type
</label>


<select id="leaveTypeFilter">


<option>
All Types
</option>


<option>
Casual Leave
</option>


<option>
Sick Leave
</option>


<option>
Emergency Leave
</option>



</select>


</div>




</div>



</div>
















<!-- LEAVE TABLE -->


<div class="card table-card table-section">


<h2>
Leave Requests
</h2>






<table>



<thead>


<tr>


<th>
Employee
</th>



<th>
Leave Type
</th>



<th>
Reason
</th>



<th>
From Date
</th>



<th>
To Date
</th>



<th>
Status
</th>



<th>
Action
</th>



</tr>



</thead>








<tbody id="leaveTableBody">


<tr>


<td colspan="7">

No Leave Requests Found

</td>


</tr>



</tbody>







</table>






</div>
